<style id="ds-tokens">
/* ==========================================================================
   BORING GOLF — FONTS
   All three faces are freely available on Google Fonts, so they load from
   the Google CDN here. Consumers get them automatically via this @import.
     · Cormorant Garamond — editorial serif, headlines & numbers of feeling
     · Inter             — quiet workhorse sans for UI & body
     · JetBrains Mono    — scores, times, money, anything counted
   ========================================================================== */

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

/* ==========================================================================
   BORING GOLF — COLOR TOKENS
   Heritage outdoor palette from the brand board: forest, leather, tan, cream.
   The brand is monochrome by nature (the badge prints in one ink), so color
   is quiet and material. Base values are named after the land; always
   reference the semantic aliases in product work.

   Brand board swatches:  Forest #243B2A · Leather #6B4A2F · Tan #C7B79A · Cream #F4EFE6
   ========================================================================== */

:root {
  /* ---- Brand palette (the brand board) -------------------------------- */
  --forest:    #243B2A; /* primary brand green — badges, dark fields        */
  --pine:      #1A2F23; /* deeper pine — software / dense dark surfaces      */
  --ink:       #14201A; /* near-black green — broadcast, video               */
  --leather:   #6B4A2F; /* leather brown — patches, engraving, hangtags      */
  --bark:      #4A3320; /* darker leather — text on tan, deep accents        */
  --tan:       #C7B79A; /* canvas / sand — chips, textured fills             */
  --cream:     #F4EFE6; /* primary light background                          */
  --oat:       #E7E0D3; /* warm off-cream — sunk surfaces, dividers          */
  --chalk:     #FFFFFF; /* pure white — raised cards                         */
  --dusk:      #6B7280; /* neutral muted gray — secondary text               */

  /* ---- Aliases kept for continuity (map onto the brand palette) -------- */
  --fairway:      var(--forest);  /* legacy name → brand forest             */
  --rough:        #3D5A47;        /* supporting mid green                    */
  --limestone:    var(--cream);   /* legacy name → brand cream              */
  --fog:          var(--oat);     /* legacy name → warm off-cream           */
  --saddle:       var(--leather); /* legacy name → brand leather            */
  --saddle-light: #8B6F47;        /* worn leather / canvas stitch            */

  /* ---- Brass: secondary accent (scoring / app only) ------------------- */
  /* The brand itself is brass-free. Brass survives only inside the golf app
     for money, skins and leaders — use it there, never on brand surfaces.  */
  --brass:      #C9A227;
  --brass-deep: #9A7B1A;

  /* ---- Functional (used like a good putter: rarely, decisively) ------- */
  --positive:  #22A55B; /* under par, confirmed, synced                     */
  --warning:   #F59E0B; /* attention, pending                               */
  --negative:  #DC2626; /* over par, error                                  */
  --alert:     #B8372D; /* masters red — live, urgent broadcast             */

  /* ---- Semantic surfaces ---------------------------------------------- */
  --surface-page:  var(--cream);   /* default page background               */
  --surface-card:  var(--chalk);   /* raised content card                   */
  --surface-sunk:  var(--oat);     /* inset / secondary panel               */
  --surface-tan:   var(--tan);     /* textured heritage chip / fill         */
  --surface-dark:  var(--forest);  /* dark section, badge field             */
  --surface-ink:   var(--ink);     /* broadcast leaderboard, video          */

  /* ---- Semantic text -------------------------------------------------- */
  --text-primary:   var(--forest); /* default body & headlines              */
  --text-secondary: var(--bark);   /* supporting copy (warm leather)        */
  --text-muted:     var(--dusk);   /* captions, meta, placeholders          */
  --text-accent:    var(--leather);/* heritage accent text                  */
  --text-on-dark:   var(--cream);  /* primary text on dark surfaces         */
  --text-on-dark-muted: rgba(244, 239, 230, 0.62);

  /* ---- Semantic lines (warm, low-contrast) ---------------------------- */
  --border-subtle:  rgba(36, 59, 42, 0.10);
  --border-default: rgba(36, 59, 42, 0.16);
  --border-strong:  rgba(36, 59, 42, 0.26);
  --border-on-dark: rgba(244, 239, 230, 0.14);

  /* ---- Accent / focus ------------------------------------------------- */
  --accent:       var(--leather);             /* brand interaction accent   */
  --accent-soft:  rgba(107, 74, 47, 0.10);    /* leather tint fill          */
  --focus-ring:   rgba(107, 74, 47, 0.30);    /* leather focus ring         */
}

/* ==========================================================================
   BORING GOLF — TYPOGRAPHY TOKENS
   Three voices: a serif that feels engraved, a neutral sans for work,
   and a mono for anything you'd keep score with.
   ========================================================================== */

:root {
  /* ---- Families ------------------------------------------------------- */
  --font-serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  --font-sans:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:  'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* ---- Type scale (rem on a 16px root) -------------------------------- */
  --text-2xs: 0.6875rem; /* 11px — eyebrow labels, mono captions           */
  --text-xs:  0.75rem;   /* 12px — meta, badges                            */
  --text-sm:  0.875rem;  /* 14px — UI text, dense body                     */
  --text-base:1rem;      /* 16px — body                                    */
  --text-lg:  1.125rem;  /* 18px — lead paragraph                          */
  --text-xl:  1.375rem;  /* 22px — small serif headline                    */
  --text-2xl: 1.5rem;    /* 24px — page title                             */
  --text-3xl: 2rem;      /* 32px — section headline                        */
  --text-4xl: 2.5rem;    /* 40px — display                                 */
  --text-5xl: 3.5rem;    /* 56px — hero display                            */

  /* ---- Weights -------------------------------------------------------- */
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;

  /* ---- Line heights --------------------------------------------------- */
  --leading-tight:   1.1;
  --leading-snug:    1.25;
  --leading-normal:  1.5;
  --leading-relaxed: 1.65;

  /* ---- Letter spacing ------------------------------------------------- */
  --tracking-tight:  -0.02em; /* serif display                            */
  --tracking-normal: 0;
  --tracking-wide:   0.1em;   /* uppercase eyebrows & mono labels          */

  /* ---- Semantic roles ------------------------------------------------- */
  /* Eyebrow: the small uppercase mono label used above sections          */
  --eyebrow-font: var(--font-mono);
  --eyebrow-size: var(--text-2xs);
  --eyebrow-weight: var(--weight-semibold);
  --eyebrow-tracking: var(--tracking-wide);
}

/* ==========================================================================
   BORING GOLF — SPACING TOKENS
   8px base rhythm. Generous negative space is a brand principle —
   when in doubt, step up one rung, not down.
   ========================================================================== */

:root {
  --space-0:  0;
  --space-1:  0.25rem;  /*  4px */
  --space-2:  0.5rem;   /*  8px */
  --space-3:  0.75rem;  /* 12px */
  --space-4:  1rem;     /* 16px */
  --space-5:  1.25rem;  /* 20px */
  --space-6:  1.5rem;   /* 24px */
  --space-8:  2rem;     /* 32px */
  --space-10: 2.5rem;   /* 40px */
  --space-12: 3rem;     /* 48px */
  --space-16: 4rem;     /* 64px */
  --space-20: 5rem;     /* 80px */
  --space-24: 6rem;     /* 96px */

  /* ---- Layout --------------------------------------------------------- */
  --container-max: 1280px;
  --container-sm:  640px;
  --container-md:  800px;
  --gutter:        var(--space-8);
}

/* ==========================================================================
   BORING GOLF — EFFECTS TOKENS
   Radii, shadows, and motion. Shapes lean rectangular and calm:
   straight lines over playful curves, shadow used for hierarchy, never
   for decoration. Motion marks state changes — it never celebrates.
   ========================================================================== */

:root {
  /* ---- Radius --------------------------------------------------------- */
  --radius-xs:  3px;
  --radius-sm:  6px;
  --radius-md:  8px;
  --radius-lg:  12px;
  --radius-xl:  16px;
  --radius-pill: 100px;
  --radius-full: 50%;

  /* ---- Shadow (light, hierarchy only) --------------------------------- */
  --shadow-sm: 0 1px 3px rgba(13, 21, 18, 0.04);
  --shadow-md: 0 4px 12px rgba(13, 21, 18, 0.08);
  --shadow-lg: 0 8px 24px rgba(13, 21, 18, 0.12);
  --shadow-xl: 0 16px 40px rgba(13, 21, 18, 0.16);
  /* On dark/broadcast surfaces shadows go deeper */
  --shadow-broadcast: 0 8px 32px rgba(0, 0, 0, 0.3);
  /* Focus ring for inputs/controls */
  --shadow-focus: 0 0 0 3px var(--focus-ring);

  /* ---- Motion --------------------------------------------------------- */
  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */
  --duration-fast:   150ms; /* @kind other */
  --duration-normal: 250ms; /* @kind other */
  --duration-slow:   400ms; /* @kind other */

  /* ---- Texture overlays (heritage materials) -------------------------- */
  /* Topographic contour line motif used at very low opacity behind dark
     sections. Reference the shipped asset where a real image is wanted.   */
  --contour-pattern: repeating-radial-gradient(
    circle at 50% 50%,
    transparent 0 8px,
    currentColor 8px 9px
  ); /* @kind other */
}

/* ==========================================================================
   BORING GOLF — BASE ELEMENT STYLES
   Quiet defaults so unstyled content already looks on-brand.
   Component-level styling lives in the React components, not here.
   ========================================================================== */

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--leading-relaxed);
  color: var(--text-primary);
  background: var(--surface-page);
}

/* ---- Headings: engraved serif -------------------------------------- */
h1, h2, h3, h4, h5, h6 {
  margin: 0;
  font-family: var(--font-serif);
  font-weight: var(--weight-medium);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--text-primary);
}

h1 { font-size: var(--text-5xl); }
h2 { font-size: var(--text-3xl); }
h3 { font-size: var(--text-2xl); }
h4 { font-size: var(--text-xl); }

p { margin: 0; }

a {
  color: inherit;
  text-decoration: none;
}

img, svg, video {
  max-width: 100%;
  display: block;
}

::selection {
  background: var(--accent-soft);
  color: var(--text-primary);
}

/* ---- Eyebrow label: the recurring uppercase mono kicker ------------- */
.bg-eyebrow {
  font-family: var(--eyebrow-font);
  font-size: var(--eyebrow-size);
  font-weight: var(--eyebrow-weight);
  letter-spacing: var(--eyebrow-tracking);
  text-transform: uppercase;
  color: var(--text-muted);
}

/* ---- Centered max-width container ----------------------------------- */
.bg-container {
  width: 100%;
  max-width: var(--container-max);
  margin-inline: auto;
  padding-inline: var(--gutter);
}

/* ---- Reduced motion: honor it -------------------------------------- */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}

<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--surface-page); color: var(--text-primary); font-family: var(--font-sans); }
  img { display: block; max-width: 100%; }
  a { text-decoration: none; color: inherit; }
  h1, h2, h3 { font-family: var(--font-serif); font-weight: 600; letter-spacing: var(--tracking-tight); margin: 0; }
  p { margin: 0; }

  .eyebrow { font-family: var(--font-mono); font-size: var(--text-2xs); font-weight: 600;

  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 clamp(20px, 5vw, 56px); }

  /* ---- top accent + nav ---- */
  .accent-bar { height: 6px; background: var(--leather); opacity: .85; }
  nav { position: sticky; top: 0; z-index: 50; background: rgba(244,239,230,.86);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-subtle); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between;
    max-width: 1280px; margin: 0 auto; padding: 12px clamp(20px, 5vw, 56px); }
  .brand { display: flex; align-items: center; gap: 12px; }
  .seal { width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
    border: 1px solid var(--border-default); background: var(--cream); flex-shrink: 0; }
  .wordmark { font-family: var(--font-serif); font-weight: 700; font-size: 21px;
    letter-spacing: .02em; line-height: 1; color: var(--text-primary); white-space: nowrap; }
  .wordmark small { display: block; font-family: var(--font-mono); font-weight: 500;
    font-size: 8.5px; letter-spacing: .22em; color: var(--text-muted); margin-top: 3px; }
  .nav-links { display: flex; gap: 30px; list-style: none; margin: 0; padding: 0; }
  .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-secondary); transition: color .15s; }
  .nav-links a:hover { color: var(--leather); }
  .nav-actions { display: flex; gap: 14px; align-items: center; }
  .cart { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono);
    font-size: 12px; color: var(--text-secondary); cursor: pointer; }
  .cart:hover { color: var(--leather); }

  /* ---- hero ---- */
  .hero { position: relative; min-height: clamp(560px, 86vh, 820px); background: var(--ink);
    display: flex; align-items: flex-end; overflow: hidden; }
  .hero image-slot, .band image-slot { color: rgba(244,239,230,.66); }
  .hero image-slot { position: absolute; inset: 0; width: 100%; height: 100%; }
  .hero::after { content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: linear-gradient(180deg, rgba(20,32,26,.34) 0%, rgba(20,32,26,.12) 38%, rgba(20,32,26,.62) 100%); }
  .hero-inner { position: relative; z-index: 2; width: 100%; padding-bottom: clamp(44px, 7vw, 88px); padding-top: 80px; }
  .hero .eyebrow { color: rgba(244,239,230,.82); }
  .hero h1 { color: var(--cream); font-size: clamp(48px, 8.5vw, 110px); line-height: .96;
    margin: 18px 0 0; max-width: 14ch; text-shadow: 0 2px 24px rgba(20,32,26,.35); }
  .hero h1 em { font-style: italic; color: var(--tan); }
  .hero-sub { color: rgba(244,239,230,.9); font-size: clamp(16px, 1.5vw, 20px);
    max-width: 46ch; margin-top: 22px; line-height: 1.55; font-family: var(--font-serif); font-style: italic; }
  .hero-cta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px; align-items: center; }
  .hero-seal { position: absolute; top: clamp(96px, 12vw, 120px); right: clamp(20px, 5vw, 56px); z-index: 2;
    width: clamp(96px, 12vw, 132px); height: clamp(96px, 12vw, 132px); border-radius: 50%;
    object-fit: cover; background: var(--cream); border: 1px solid rgba(244,239,230,.5);
    box-shadow: var(--shadow-lg); }

  /* ---- marquee strip ---- */
  .strip { background: var(--surface-dark); color: var(--text-on-dark); overflow: hidden; }
  .strip-track { display: flex; gap: 56px; padding: 16px 0; white-space: nowrap;
    animation: marquee 34s linear infinite; }
  @media (prefers-reduced-motion: reduce) { .strip-track { animation: none; justify-content: center; flex-wrap: wrap; } }
  .strip-track span { font-family: var(--font-mono); font-size: 12px; letter-spacing: .18em;
    text-transform: uppercase; color: rgba(244,239,230,.78); display: inline-flex; align-items: center; gap: 56px; }
  .strip-track span::after { content: '·'; color: var(--tan); }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ---- section heading ---- */
  .sec { padding: clamp(56px, 8vw, 104px) 0; }

  .sec-head p { color: var(--text-secondary); max-width: 38ch; font-size: 16px; line-height: 1.6; margin-top: 12px; }

  /* ---- responsive ---- */

  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;

      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;

      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

  const CartIcon = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 2-1.58l1.65-7.42H5.12"/></svg>

  );

    { id:'yardage', name:'Yardage Book Cover', desc:'Refillable cover that breaks in like an old glove. Fits standard books.', price:'$42', image:'/images/yardage.png' },
    { id:'pouch', name:'Ball-Marker Pouch', desc:'Small bag for markers, tees, and the things you keep losing.', price:'$28', image:'/images/pouch.png' },
    { id:'valuables', name:'Valuables Bag', desc:'Keys, wallet, phone. Drops in the cart and out of your mind.', price:'$96', tag:'New', tone:'green', image:'/images/valuables.png' },
    { id:'headcover', name:'Driver Head Cover', desc:'Padded leather with a brass snap. Quietly the best-dressed club in the bag.', price:'$58', image:'/images/headcover.png' },

  ];

  const CRAFT = [
    { n:'01', t:'The leather', d:'Vegetable-tanned full-grain from a small Midwest tannery. It ages; it does not wear out.' },
    { n:'02', t:'The stitch', d:'Saddle-stitched by hand, two needles, one seam at a time. Stronger than anything a machine runs.' },
    { n:'03', t:'The mark', d:'Every piece is engraved with the badge and a quiet number. One at a time, never two the same.' },
  ];

  function Nav() {
    return (
      <nav>
        <div className="nav-inner">
          <a className="brand" href="#top">
            <img className="seal" src={SEAL} alt="Boring Golf badge" />
            <span className="wordmark">BORING GOLF<small>BAD LIE, GOOD LIFE</small></span>

            <li><a href="#shop">Shop</a></li>
            <li><a href="#craft">The Craft</a></li>
            <li><a href="#story">Story</a></li>
            <li><a href="#journal">Journal</a></li>

            <a className="cart"><CartIcon/> Cart (0)</a>
            <Button variant="primary" size="sm" onClick={() => document.getElementById('shop').scrollIntoView()}>Shop the goods</Button>
          </div>
        </div>
      </nav>
    );
  }

  function Hero() {
    return (
      <header className="hero" id="top">
        <image-slot id="hero-photo" fit="cover" src="/images/hero.png" placeholder="Drop a forest / course hero photo"></image-slot>
        <img className="hero-seal" src={SEAL} alt="Boring Golf heritage badge" />
        <div className="hero-inner">
          <div className="wrap">
            <p className="eyebrow">Est. 2025 · Handmade leather goods</p>
            <h1>Bad lie,<br/><em>good life.</em></h1>
            <p className="hero-sub">Hand-cut, hand-stitched leather goods for golfers who'd rather be in the trees. Made one at a time — and built to outlast the round.</p>
            <div className="hero-cta">
              <Button variant="primary" size="lg" iconRight={<Arrow/>} onClick={() => document.getElementById('shop').scrollIntoView()}>Shop the goods</Button>

            </div>
          </div>
        </div>
      </header>
    );
  }

  function Strip() {
    const items = ['Hand-cut', 'Hand-stitched', 'One at a time', 'Vegetable-tanned', 'Made in Chicago', 'Free repairs for life'];
    const row = items.map((t,i) => <span key={i}>{t}</span>);
    return (
      <div className="strip">
        <div className="strip-track">{row}{row}</div>
      </div>
    );
  }

  function Shop() {
    return (
      <section className="sec wrap" id="shop">
        <div className="sec-head">
          <div>
            <p className="eyebrow">The goods</p>
            <h2 style={{ marginTop: 14 }}>Small-batch leather, for the back nine and beyond</h2>
          </div>
          <p>Each piece is made to order in the shop. Nothing sits on a rack waiting for you — it's cut once you ask for it.</p>
        </div>
        <div className="grid">
          {PRODUCTS.map(p => (
            <article className="prod" key={p.id}>
              <image-slot id={'prod-' + p.id} fit="cover" src={p.image} placeholder={'Photo · ' + p.name}></image-slot>
              <div className="prod-head">
                <h3>{p.name}</h3>
                <span className="prod-price">{p.price}</span>
              </div>
              <p className="prod-desc">{p.desc}</p>
              {p.tag && <div className="prod-tag"><Badge tone={p.tone}>{p.tag}</Badge></div>}
            </article>
          ))}
        </div>
        <div style={{ textAlign:'center', marginTop: 'clamp(40px,5vw,60px)' }}>
          <Button variant="secondary" size="lg" iconRight={<Arrow/>}>Browse the full shop</Button>
        </div>
      </section>
    );
  }

  function Craft() {
    return (
      <section className="craft" id="craft">
        <div className="craft-topo"></div>
        <div className="sec wrap craft-inner">
          <div>
            <p className="eyebrow">The craft</p>
            <h2>Made by hand. Made to be handed down.</h2>
            <p className="craft-lead">There's no factory and no rush. Every piece is cut, stitched, and engraved one at a time — the way leather goods were made before they were mass-produced.</p>
            <ul className="craft-list">
              {CRAFT.map(c => (
                <li key={c.n}>
                  <span className="craft-num">{c.n}</span>
                  <div>
                    <h4>{c.t}</h4>
                    <p>{c.d}</p>
                  </div>
                </li>
              ))}
            </ul>
          </div>
          <image-slot id="craft-photo" fit="cover" src="/images/craft.png" placeholder="Drop a workshop / leather detail photo"></image-slot>
        </div>
      </section>
    );
  }

  function Band() {
    return (
      <section className="band" id="story">
        <image-slot id="band-photo" fit="cover" src="/images/band.png" placeholder="Drop a wide forest / course photo"></image-slot>
        <div className="band-inner">
          <p className="eyebrow">Play more. Care less.</p>
          <h2>See you in the woods.</h2>
          <p>Golf is best unhurried, a little off the beaten path, and never taking itself too seriously.</p>
        </div>
      </section>
    );
  }

  function News() {
    return (
      <section className="sec wrap news" id="journal">
        <p className="eyebrow">The mailing list</p>
        <h2 style={{ marginTop: 14 }}>First dibs on every drop</h2>
        <p>We make small batches and they go fast. Leave your email and we'll tell you when the leather's cut — nothing else.</p>
        <form className="news-form" onSubmit={(e) => e.preventDefault()}>
          <input type="email" placeholder="you@example.com" aria-label="Email address" />
          <Button variant="primary" size="lg" type="submit">Keep me posted</Button>
        </form>
        <p className="news-note">No spam · Unsubscribe anytime</p>
      </section>
    );
  }

  function Footer() {
    const cols = [
      { h:'Shop', links:['Scorecard holders','Yardage covers','Head covers','Hat patches','Gift cards'] },
      { h:'The brand', links:['Our story','The craft','Journal','Stockists'] },
      { h:'Help', links:['Shipping','Repairs','Returns','Contact'] },
    ];
    return (
      <footer>
        <div className="wrap foot-grid">
          <div className="foot-brand">
            <img className="seal" src={SEAL} alt="Boring Golf badge" />
            <div>
              <span className="wordmark">BORING GOLF<small>BAD LIE, GOOD LIFE</small></span>
              <p>Heritage leather goods for people who'd rather be in the trees. Hand-cut, hand-stitched, one at a time.</p>
            </div>
          </div>
          {cols.map(c => (
            <div className="foot-col" key={c.h}>
              <h5>{c.h}</h5>
              <ul>{c.links.map(l => <li key={l}><a>{l}</a></li>)}</ul>
            </div>
          ))}
        </div>
        <div className="foot-bottom">
          <span>© 2025 Boring Golf · Est. 2025</span>
          <span>Made with care in Chicago</span>
        </div>
      </footer>
    );
  }

  function App() {
    return (
      <>
        <Nav/>
        <Hero/>
        <Strip/>
        <Shop/>
        <Craft/>
        <Band/>
        <News/>
        <Footer/>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
